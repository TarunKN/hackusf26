version: "3.9"

services:
  # ── FastAPI + ADK backend ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formcoach-api
    restart: unless-stopped
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL:-gemini-2.5-flash}
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - UPLOAD_DIR=/tmp/formcoach_uploads
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - USE_CLOUD_LOGGING=false
    volumes:
      - uploads:/tmp/formcoach_uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx: serves frontend + proxies API ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: formcoach-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  uploads:
